name: Flutter CI/CD Clean Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Kodu çek
      - name: Check out code
        uses: actions/checkout@v3

      # 2️⃣ Flutter ortamını kur
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'

      # 3️⃣ Repo root olarak tanımla
      - name: Set working directory
        run: echo "WORKDIR=$(pwd)" >> $GITHUB_ENV

      # 4️⃣ Clean build
      - name: Clean previous builds
        run: flutter clean

      # 5️⃣ Dependencies yükle
      - name: Flutter pub get
        run: flutter pub get

      # 6️⃣ Testleri çalıştır
      - name: Run tests
        run: flutter test

      # 7️⃣ APK build et
      - name: Build APK
        run: flutter build apk --release

      # 8️⃣ APK’yı artifacts olarak kaydet
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk