name: Build Flutter APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Kodu çek
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Zip dosyasını çıkart
      - name: Extract Asgard.zip
        run: |
          unzip -o Asgard.zip -d project/
          echo "--- Proje içeriği ---"
          ls project/

      # 3. Java 17 kur
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # 4. Flutter kur
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      # 5. Flutter sürümünü doğrula
      - name: Check Flutter version
        run: flutter --version

      # 6. Bağımlılıkları yükle
      - name: Install Flutter dependencies
        working-directory: project
        run: flutter pub get

      # 7. Launcher icon oluştur
      - name: Generate launcher icons
        working-directory: project
        run: dart run flutter_launcher_icons
        continue-on-error: true

      # 8. Splash screen oluştur
      - name: Generate splash screen
        working-directory: project
        run: dart run flutter_native_splash:create
        continue-on-error: true

      # 9. Kod analizi
      - name: Analyze code
        working-directory: project
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # 10. APK derle
      - name: Build Debug APK
        working-directory: project
        run: flutter build apk --debug

      # 11. APK'yı artifact olarak kaydet
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: project/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
