# This is the workflow to build and test the Flutter application

name: Flutter CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v2

      name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
           flutter-version: '3.24.0'
           channel: 'stable'

      - name: Run flutter pub get
        run: flutter pub get

      - name: Run unittest
        run: flutter test