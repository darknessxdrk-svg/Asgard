# Flutter CI/CD for root project
name: Flutter CI/CD Clean Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Kodu çek
      - name: Check out code
        uses: actions/checkout@v3

      # 2️⃣ Flutter ortamını kur
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'

      # 3️⃣ Cache temizle / temiz build
      - name: Clean previous builds
        run: |
          flutter clean
          rm -rf build/
          rm -rf .dart_tool/
          rm -rf .pub-cache/

      # 4️⃣ Dependencies yükle
      - name: Flutter pub get
        run: flutter pub get

      # 5️⃣ Testleri çalıştır
      - name: Run tests
        run: flutter test

      # 6️⃣ APK build et
      - name: Build APK
        run: flutter build apk --release

      # 7️⃣ APK’yı artifacts olarak kaydet
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk