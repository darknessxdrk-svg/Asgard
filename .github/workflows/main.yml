name: Build Flutter APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Asgard.zip
        run: |
          mkdir -p project
          unzip -o Asgard.zip -d _ziptemp
          COUNT=$(ls _ziptemp | wc -l)
          FIRST=$(ls _ziptemp | head -1)
          if [ "$COUNT" -eq 1 ] && [ -d "_ziptemp/$FIRST" ]; then
            cp -r _ziptemp/$FIRST/. project/
          else
            cp -r _ziptemp/. project/
          fi
          rm -rf _ziptemp

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('project/pubspec.lock') }}
          restore-keys: pub-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('project/android/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Setup keystore
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | tr -d " \n" | base64 -d > ~/.android/debug.keystore
          sed -i "s|storeFile=.*|storeFile=$HOME/.android/debug.keystore|" project/android/key.properties
          echo "key.properties:"
          cat project/android/key.properties

      - name: Install Flutter dependencies
        working-directory: project
        run: flutter pub get

      - name: Generate launcher icons
        working-directory: project
        run: dart run flutter_launcher_icons
        continue-on-error: true

      - name: Generate splash screen
        working-directory: project
        run: dart run flutter_native_splash:create
        continue-on-error: true

      - name: Build APK (Release)
        working-directory: project
        run: |
          flutter build apk --release \
            --target-platform android-arm64 \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --dart-define=CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }} \
            --dart-define=CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }} \
            --dart-define=FCM_SERVICE_ACCOUNT_JSON_B64=${{ secrets.FCM_SERVICE_ACCOUNT_JSON_B64 }}

      - name: Find & rename APK
        run: |
          echo "=== Tüm APK'lar ==="
          find project/build -name "*.apk" 2>/dev/null
          echo "=== Kopyalama ==="
          # ABI splits veya normal - hangisi varsa al
          APK=$(find project/build -name "*.apk" | grep -v "unsigned\|unaligned" | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" project/build/asgard-release.apk
            echo "✅ APK bulundu: $APK"
          else
            echo "❌ APK bulunamadı"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: asgard-release
          path: project/build/asgard-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: project/build/asgard-release.apk
          name: "Sürüm ${{ github.ref_name }}"
          body: |
            ## 🚀 Yeni Güncelleme: ${{ github.ref_name }}
            APK'yı indirmek için aşağıdaki dosyaya tıklayın.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
