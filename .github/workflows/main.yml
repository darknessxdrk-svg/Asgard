name: Build Flutter APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Asgard.zip
        run: |
          mkdir -p project
          unzip -o Asgard.zip -d _ziptemp
          COUNT=$(ls _ziptemp | wc -l)
          FIRST=$(ls _ziptemp | head -1)
          if [ "$COUNT" -eq 1 ] && [ -d "_ziptemp/$FIRST" ]; then
            cp -r _ziptemp/$FIRST/. project/
          else
            cp -r _ziptemp/. project/
          fi
          rm -rf _ziptemp

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('project/pubspec.lock') }}
          restore-keys: pub-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('project/android/**/*.gradle*') }}
          restore-keys: gradle-

      # Sabit keystore kur ve SHA-1 yazdır
      - name: Setup keystore
        run: |
          mkdir -p ~/.android
          cat << 'EOF' | base64 -d > ~/.android/debug.keystore
          
          EOF

          echo "=== Keystore SHA-1 ==="
          keytool -list -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android 2>/dev/null | grep "SHA1:"
          
          # key.properties'i güncelle - gerçek path ile
          sed -i "s|storeFile=.*|storeFile=$HOME/.android/debug.keystore|" project/android/key.properties
          echo "key.properties:"
          cat project/android/key.properties

      - name: Install Flutter dependencies
        working-directory: project
        run: flutter pub get

      - name: Generate launcher icons
        working-directory: project
        run: dart run flutter_launcher_icons
        continue-on-error: true

      - name: Generate splash screen
        working-directory: project
        run: dart run flutter_native_splash:create
        continue-on-error: true

      - name: Build APK
        working-directory: project
        run: flutter build apk --debug --target-platform android-arm64 --dart-define=ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}

      # APK'nın gerçek SHA-1'ini yazdır - Firebase'deki ile karşılaştır
      - name: Print APK SHA-1
        run: |
          echo "=== APK İMZA SHA-1 (Firebase'e bu eklenecek) ==="
          cd $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)
          ./apksigner verify --print-certs \
            $GITHUB_WORKSPACE/project/build/app/outputs/flutter-apk/app-debug.apk \
            | grep -i "sha"
        continue-on-error: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: project/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          repository: darknessxdrk-svg/Asgard
          files: project/build/app/outputs/flutter-apk/app-debug.apk
          name: "Sürüm ${{ github.ref_name }}"
          body: |
            ## 🚀 Yeni Güncelleme: ${{ github.ref_name }}
            APK'yı indirmek için aşağıdaki dosyaya tıklayın.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}