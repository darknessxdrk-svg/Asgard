# Workflow to build, test and generate APK for Flutter app
name: Flutter CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Kodu çek
      - name: Check out code
        uses: actions/checkout@v2

      # 2️⃣ Flutter ortamını kur
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'

      # 3️⃣ Dependencies yükle
      - name: Flutter pub get
        run: flutter pub get

      # 4️⃣ Testleri çalıştır
      - name: Run tests
        run: flutter test

      # 5️⃣ APK build et
      - name: Build APK
        run: flutter build apk --release

      # 6️⃣ APK’yı artifacts olarak kaydet
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk