name: Build Flutter APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Kodu çek
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Zip dosyasını çıkart
      - name: Extract Asgard.zip
        run: unzip -o Asgard.zip -d project

      # 3. Java 17 kur
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # 4. Flutter kur (cache açık)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      # 5. Pub cache
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('project/pubspec.lock') }}
          restore-keys: pub-

      # 6. Gradle cache
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('project/android/**/*.gradle*') }}
          restore-keys: gradle-

      # 7. Bağımlılıkları yükle
      - name: Install Flutter dependencies
        working-directory: project
        run: flutter pub get

      # 8. Launcher icon oluştur
      - name: Generate launcher icons
        working-directory: project
        run: dart run flutter_launcher_icons
        continue-on-error: true

      # 9. Splash screen oluştur
      - name: Generate splash screen
        working-directory: project
        run: dart run flutter_native_splash:create
        continue-on-error: true

      # 10. APK derle
      - name: Build APK
        working-directory: project
        run: flutter build apk --debug --target-platform android-arm64

      # 11. SHA-1 yazdır (build sonrası keystore oluşur)
      - name: Print SHA-1
        run: keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android 2>/dev/null | grep "SHA1"
        continue-on-error: true

      # 12. APK'yı artifact olarak kaydet
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: project/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      # 13. Tag push'unda Release oluştur
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          repository: darknessxdrk-svg/Asgard
          files: project/build/app/outputs/flutter-apk/app-debug.apk
          name: "Sürüm ${{ github.ref_name }}"
          body: |
            ## 🚀 Yeni Güncelleme: ${{ github.ref_name }}
            
            APK'yı indirmek için aşağıdaki dosyaya tıklayın.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
