name: Build APK + Deploy Functions

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1: Cloud Functions deploy (her push'ta)
  # ──────────────────────────────────────────────────────────────
  deploy-functions:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Asgard.zip
        run: |
          mkdir -p project
          unzip -o Asgard.zip -d _ziptemp
          COUNT=$(ls _ziptemp | wc -l)
          FIRST=$(ls _ziptemp | head -1)
          if [ "$COUNT" -eq 1 ] && [ -d "_ziptemp/$FIRST" ]; then
            cp -r _ziptemp/$FIRST/. project/
          else
            cp -r _ziptemp/. project/
          fi
          rm -rf _ziptemp

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install Functions dependencies
        working-directory: project/functions
        run: npm install

      - name: Set Firebase secrets
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          cd project

          # Her secret'ı Firebase Secret Manager'a yükle
          echo "${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}" | \
            firebase functions:secrets:set FCM_SERVICE_ACCOUNT_JSON \
            --project asgardchat-f3880 --token "$FIREBASE_TOKEN" --force || true

          echo "${{ secrets.CLOUDINARY_API_SECRET }}" | \
            firebase functions:secrets:set CLOUDINARY_API_SECRET \
            --project asgardchat-f3880 --token "$FIREBASE_TOKEN" --force || true

          echo "${{ secrets.CLOUDINARY_API_KEY }}" | \
            firebase functions:secrets:set CLOUDINARY_API_KEY \
            --project asgardchat-f3880 --token "$FIREBASE_TOKEN" --force || true

          echo "${{ secrets.CLOUDINARY_CLOUD_NAME }}" | \
            firebase functions:secrets:set CLOUDINARY_CLOUD_NAME \
            --project asgardchat-f3880 --token "$FIREBASE_TOKEN" --force || true

          echo "${{ secrets.AGORA_APP_CERTIFICATE }}" | \
            firebase functions:secrets:set AGORA_APP_CERTIFICATE \
            --project asgardchat-f3880 --token "$FIREBASE_TOKEN" --force || true

          echo "${{ secrets.AGORA_APP_ID }}" | \
            firebase functions:secrets:set AGORA_APP_ID \
            --project asgardchat-f3880 --token "$FIREBASE_TOKEN" --force || true

          echo "${{ secrets.GEMINI_API_KEY }}" | \
            firebase functions:secrets:set GEMINI_API_KEY \
            --project asgardchat-f3880 --token "$FIREBASE_TOKEN" --force || true

      - name: Deploy Functions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          cd project
          firebase deploy --only functions \
            --project asgardchat-f3880 \
            --token "$FIREBASE_TOKEN" \
            --force

  # ──────────────────────────────────────────────────────────────
  # JOB 2: Flutter APK build
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: deploy-functions

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Asgard.zip
        run: |
          mkdir -p project
          unzip -o Asgard.zip -d _ziptemp
          COUNT=$(ls _ziptemp | wc -l)
          FIRST=$(ls _ziptemp | head -1)
          if [ "$COUNT" -eq 1 ] && [ -d "_ziptemp/$FIRST" ]; then
            cp -r _ziptemp/$FIRST/. project/
          else
            cp -r _ziptemp/. project/
          fi
          rm -rf _ziptemp

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('project/pubspec.lock') }}
          restore-keys: pub-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('project/android/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Setup keystore
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | tr -d " \n" | base64 -d > ~/.android/debug.keystore
          sed -i "s|storeFile=.*|storeFile=$HOME/.android/debug.keystore|" project/android/key.properties

      - name: Flutter pub get
        working-directory: project
        run: flutter pub get

      - name: Generate launcher icons
        working-directory: project
        run: dart run flutter_launcher_icons
        continue-on-error: true

      - name: Generate splash screen
        working-directory: project
        run: dart run flutter_native_splash:create
        continue-on-error: true

      - name: Build APK
        working-directory: project
        run: |
          flutter build apk --debug \
            --dart-define=AGORA_APP_ID=${{ secrets.AGORA_APP_ID }}

      - name: Rename APK
        run: |
          APK=$(find project/build -name "*.apk" | grep -v "unsigned\|unaligned" | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" project/build/asgard-release.apk
            echo "✅ APK: $APK"
          else
            echo "❌ APK bulunamadı"; exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: asgard-release
          path: project/build/asgard-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: project/build/asgard-release.apk
          name: "Sürüm ${{ github.ref_name }}"
          body: |
            ## 🚀 Yeni Güncelleme: ${{ github.ref_name }}
            APK'yı indirmek için aşağıdaki dosyaya tıklayın.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
