name: Build Flutter APK (Release)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Asgard.zip
        run: |
          mkdir -p project
          unzip -o Asgard.zip -d _ziptemp
          COUNT=$(ls _ziptemp | wc -l)
          FIRST=$(ls _ziptemp | head -1)
          if [ "$COUNT" -eq 1 ] && [ -d "_ziptemp/$FIRST" ]; then
            cp -r _ziptemp/$FIRST/. project/
          else
            cp -r _ziptemp/. project/
          fi
          rm -rf _ziptemp

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('project/pubspec.lock') }}
          restore-keys: pub-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('project/android/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Setup Keystore
        run: |
          mkdir -p project/android/app

          # Eğer RELEASE_KEYSTORE_BASE64 secret varsa onu kullan
          # Yoksa otomatik keystore oluştur (ilk build veya secret eklenmemişse)
          if [ -n "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" ]; then
            echo "✅ Secret'tan keystore yükleniyor..."
            echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | tr -d ' \n' | base64 -d > project/android/app/release.keystore
            STORE_PASS="${{ secrets.RELEASE_STORE_PASSWORD }}"
            KEY_PASS="${{ secrets.RELEASE_KEY_PASSWORD }}"
            KEY_ALIAS="${{ secrets.RELEASE_KEY_ALIAS }}"
          else
            echo "⚠️  Secret yok — otomatik keystore oluşturuluyor..."
            keytool -genkeypair \
              -v \
              -keystore project/android/app/release.keystore \
              -alias asgard \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass Darkness4577. \
              -keypass Darkness4577. \
              -dname "CN=Asgard, OU=Mobile, O=Asgard, L=Istanbul, S=Istanbul, C=TR"
            STORE_PASS="Darkness4577."
            KEY_PASS="Darkness4577."
            KEY_ALIAS="asgard"

            # Base64 çıktısını logla — kopyalayıp secret ekleyebilirsin
            echo ""
            echo "======================================================"
            echo "RELEASE_KEYSTORE_BASE64 için bu değeri kopyala:"
            echo "======================================================"
            base64 -w 0 project/android/app/release.keystore
            echo ""
            echo "======================================================"
          fi

          # key.properties yaz
          cat > project/android/key.properties << PROPS
          storePassword=${STORE_PASS}
          keyPassword=${KEY_PASS}
          keyAlias=${KEY_ALIAS}
          storeFile=release.keystore
          PROPS

          echo "✅ Keystore hazır"
          ls -lh project/android/app/release.keystore

      - name: Install Flutter dependencies
        working-directory: project
        run: flutter pub get

      - name: Generate launcher icons
        working-directory: project
        run: dart run flutter_launcher_icons
        continue-on-error: true

      - name: Generate splash screen
        working-directory: project
        run: dart run flutter_native_splash:create
        continue-on-error: true

      - name: Build Release APK
        working-directory: project
        run: |
          flutter build apk --release \
            --dart-define=CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }} \
            --dart-define=CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }} \
            --dart-define=FCM_SERVICE_ACCOUNT_JSON_B64=${{ secrets.FCM_SERVICE_ACCOUNT_JSON_B64 }} \
            --dart-define=AGORA_APP_ID=${{ secrets.AGORA_APP_ID }}

      - name: Find & rename APK
        run: |
          APK=$(find project/build -name "app-release.apk" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find project/build -name "*.apk" | grep -v "unsigned\|unaligned" | head -1)
          fi
          if [ -n "$APK" ]; then
            cp "$APK" project/build/asgard-release.apk
            echo "✅ APK bulundu: $APK"
          else
            echo "❌ APK bulunamadı"; exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: asgard-release
          path: project/build/asgard-release.apk
          retention-days: 30

      - name: Save keystore as artifact (ilk build için)
        if: ${{ secrets.RELEASE_KEYSTORE_BASE64 == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: asgard-keystore-KAYDET
          path: project/android/app/release.keystore
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: project/build/asgard-release.apk
          name: "Sürüm ${{ github.ref_name }}"
          body: |
            ## 🚀 Asgard ${{ github.ref_name }}
            APK'yı indirmek için aşağıdaki dosyaya tıklayın.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

